name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Plugin Layout
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON files
        run: |
          python -m json.tool .claude-plugin/plugin.json > /dev/null
          python -m json.tool .claude-plugin/marketplace.json > /dev/null
          echo "JSON validation passed."

      - name: Verify component counts match plugin.json
        run: |
          ACTUAL_AGENTS=$(find agents -name "*.md" | wc -l | xargs)
          ACTUAL_COMMANDS=$(find commands -name "sf-*.md" | wc -l | xargs)
          ACTUAL_SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d | wc -l | xargs)

          PLUGIN_AGENTS=$(python - <<'PY'
import json
print(json.load(open(".claude-plugin/plugin.json"))["components"]["agents"])
PY
)
          PLUGIN_COMMANDS=$(python - <<'PY'
import json
print(json.load(open(".claude-plugin/plugin.json"))["components"]["commands"])
PY
)
          PLUGIN_SKILLS=$(python - <<'PY'
import json
print(json.load(open(".claude-plugin/plugin.json"))["components"]["skills"])
PY
)

          test "$PLUGIN_AGENTS" = "$ACTUAL_AGENTS"
          test "$PLUGIN_COMMANDS" = "$ACTUAL_COMMANDS"
          test "$PLUGIN_SKILLS" = "$ACTUAL_SKILLS"
          echo "Component count validation passed."

      - name: Validate prompt files
        run: |
          python tests/validate_prompts.py

  build:
    name: Build Plugin Package
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(python - <<'PY'
import tomllib
with open("pyproject.toml", "rb") as f:
    print(tomllib.load(f)["project"]["version"])
PY
)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create package
        run: |
          mkdir -p dist
          zip -r "dist/sf-compound-engineering-v${{ steps.version.outputs.version }}.zip" \
            .claude-plugin \
            commands \
            agents \
            skills \
            README.md \
            CONTRIBUTING.md \
            LICENSE \
            -x "*.git*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sf-compound-engineering-plugin
          path: dist/*.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sf-compound-engineering-plugin
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
